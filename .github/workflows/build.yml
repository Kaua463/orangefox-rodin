name: OrangeFox Recovery

on:
  workflow_dispatch:
    inputs:
      branch:
        description: OrangeFox sync branch
        required: true
        default: "14.1"
      lunch:
        description: Lunch target
        required: true
        default: "twrp_rodin-ap2a-eng"
      build_target:
        description: Build target
        required: true
        default: "recoveryimage"
      runner:
        description: Runner label
        required: true
        default: "ubuntu-latest"
      build_jobs:
        description: Parallel build jobs
        required: true
        default: "1"

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 720

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device-tree

      - name: Free disk space (remove unused preinstalled toolchains)
        shell: bash
        run: |
          set -euo pipefail
          # The 25209-action build ate through the runner's disk in ~5min
          # during peak compile (63G free -> 15G free) and died with ENOSPC
          # at 51% done. GH-hosted runners ship ~30-40GB of toolchains we
          # never use for an AOSP-style source build (repo/git bring our own
          # toolchain) — reclaim it before we need it.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost /opt/az 2>/dev/null || true
          df -h

      - name: Install host packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lz4 zstd pngcrush rsync schedtool \
            squashfs-tools unzip xsltproc zip zlib1g-dev mkbootimg

      - name: Install repo tool
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Show runner resources
        shell: bash
        run: |
          df -h
          free -h

      - name: Sync OrangeFox
        shell: bash
        run: |
          set -euo pipefail
          (
            while sleep 60; do
              echo "Heartbeat..."
              df -h
              free -h
            done
          ) &
          HEARTBEAT_PID=$!
          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT

          git clone https://gitlab.com/OrangeFox/sync.git "$GITHUB_WORKSPACE/ofox-sync"
          cd "$GITHUB_WORKSPACE/ofox-sync"

          ./orangefox_sync.sh \
            --branch "${{ inputs.branch }}" \
            --path "$GITHUB_WORKSPACE/OrangeFox"

          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

      - name: Copy rodin device tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi"

          rsync -a --delete \
            --exclude ".git" \
            --exclude "images" \
            "$GITHUB_WORKSPACE/device-tree/" \
            "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/"

      - name: Verify prebuilts
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/prebuilt/vendor_boot_stock.img"
          ls -lh "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/prebuilt/vendor_ramdisk00" || true

      - name: Free space
        shell: bash
        run: |
          rm -rf "$GITHUB_WORKSPACE/OrangeFox/.repo"
          rm -rf "$GITHUB_WORKSPACE/ofox-sync"
          df -h
          free -h

      - name: Add build swap
        shell: bash
        run: |
          set -euo pipefail
          # Two prior runs (author's -j1 attempts and our -j3 attempt) both
          # died with "runner has received a shutdown signal" at the exact
          # same point: right after soong_build finishes compiling itself,
          # entering the Android.bp module-graph analysis phase. That phase
          # is memory-hungry and this runner only has 15GB RAM + 3GB swap.
          # README recommends exactly this for 16GB machines.
          sudo fallocate -l 16G /swap-build.img
          sudo chmod 600 /swap-build.img
          sudo mkswap /swap-build.img
          sudo swapon /swap-build.img
          free -h

      - name: Build OrangeFox
        shell: bash
        working-directory: ${{ github.workspace }}/OrangeFox
        env:
          ALLOW_MISSING_DEPENDENCIES: "true"
          FOX_BUILD_DEVICE: rodin
          FOX_AB_DEVICE: "1"
          FOX_VIRTUAL_AB_DEVICE: "1"
          OF_FORCE_PREBUILT_KERNEL: "1"
          OF_LOW_MEMORY_BUILD: "1"
          OF_BUILD_JOBS: "${{ inputs.build_jobs }}"
          NINJA_ARGS: "-j${{ inputs.build_jobs }}"
          SOONG_UI_NINJA_ARGS: "-j${{ inputs.build_jobs }}"
          USE_CCACHE: "0"
          GOMAXPROCS: "${{ inputs.build_jobs }}"
          GOGC: "20"
          GOMEMLIMIT: "3GiB"
          _JAVA_OPTIONS: "-Xmx3g"
        run: |
          set -eo pipefail
          source build/envsetup.sh
          lunch "${{ inputs.lunch }}"
          mka -j"${{ inputs.build_jobs }}" adbd "${{ inputs.build_target }}" 2>&1 | tee "$GITHUB_WORKSPACE/orangefox-build.log"

      - name: Locate recovery ramdisk
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT="$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin"

          find "$PRODUCT" -maxdepth 4 -type f | sort | tee "$GITHUB_WORKSPACE/product_files.txt" || true

          if [ ! -f "$PRODUCT/vendor_boot.img" ]; then
            echo "::error::No vendor_boot.img found (native vendorbootimage build did not produce one)"
            exit 1
          fi
          ls -lh "$PRODUCT/vendor_boot.img"

      # The native `mka vendorbootimage` build (AOSP core Makefile's own
      # BOARD_VENDOR_RAMDISK_FRAGMENTS assembly) correctly embeds the
      # compiled recovery ramdisk, but ninja's own size check rejects the
      # result: 79380480 bytes vs the real 67108864-byte partition. Root
      # cause: the recovery fragment (~47.5MB) is lz4-compressed at only
      # ~36% ratio on this content.
      #
      # FIRST FIX ATTEMPT used xz -9 (~17.5% ratio) and BOOTLOOPED the real
      # device: its kernel config (verified live via `adb shell su 0 -c
      # "zcat /proc/config.gz"`) has CONFIG_RD_XZ NOT SET, only
      # CONFIG_RD_GZIP/CONFIG_RD_LZ4/CONFIG_RD_ZSTD. mkbootimg itself is
      # compression-agnostic (just concatenates raw fragment bytes per the
      # vendor ramdisk table) but the KERNEL's initramfs decompressor only
      # supports whatever CONFIG_RD_* it was actually built with -- always
      # verify /proc/config.gz on the real device before picking a
      # compression format, don't assume "auto-detects everything".
      #
      # Now uses zstd (CONFIG_RD_ZSTD=y confirmed), -19 with explicit
      # --zstd=wlog=23 (8MiB window, pinned to stay under
      # lib/decompress_unzstd.c's ZSTD_WINDOWSIZE_MAX check). ~22% ratio --
      # between lz4 and xz, but actually supported. The stock platform
      # fragment is left completely untouched either way.
      - name: Recompress recovery ramdisk fragment with zstd and repack
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT="$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin"
          UNPACK="$PRODUCT/vendor_boot_unpack"
          OUT="$PRODUCT/vendor_boot_patched.img"

          rm -rf "$UNPACK"
          mkdir -p "$UNPACK"

          unpack_bootimg --boot_img "$PRODUCT/vendor_boot.img" --out "$UNPACK" \
            --format mkbootimg > "$UNPACK/mkbootimg_args.txt"

          # The apt-packaged /usr/bin/mkbootimg is broken (ModuleNotFoundError:
          # No module named 'gki' -- its generate_gki_certificate import isn't
          # satisfied by the Debian package layout). Use the one OrangeFox's
          # own build already compiled as a self-contained "embedded python
          # archive" (confirmed working -- it's the same binary that built the
          # oversized vendor_boot.img moments earlier in this same job).
          MKBOOTIMG_BIN="$GITHUB_WORKSPACE/OrangeFox/out/host/linux-x86/bin/mkbootimg"
          AVBTOOL_BIN="$GITHUB_WORKSPACE/OrangeFox/out/host/linux-x86/bin/avbtool"
          FINGERPRINT_FILE="$PRODUCT/build_fingerprint.txt"

          python3 "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/recompress_recovery.py" \
            "$UNPACK" "$OUT" "$MKBOOTIMG_BIN" "$AVBTOOL_BIN" "$FINGERPRINT_FILE"

          ls -lh "$OUT"
          SIZE=$(stat -c%s "$OUT")
          MAX=67108864
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::vendor_boot_patched.img still too large ($SIZE > $MAX)"
            exit 1
          fi
          echo "vendor_boot_patched.img fits: $SIZE <= $MAX"

          unpack_bootimg --boot_img "$OUT" | tee "$GITHUB_WORKSPACE/vendor_boot_patched_info.txt"

      - name: Collect artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          PRODUCT="$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin"

          if [ -d "$PRODUCT" ]; then
            find "$PRODUCT" \
              -maxdepth 1 \
              -type f \
              \( -name "*.img" -o -name "*.zip" -o -name "*.txt" \) \
              -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/" \;
          fi

          cp -v "$GITHUB_WORKSPACE/orangefox-build.log" "$GITHUB_WORKSPACE/artifacts/" || true
          cp -v "$GITHUB_WORKSPACE/vendor_boot_patched_info.txt" "$GITHUB_WORKSPACE/artifacts/" || true
          cp -v "$GITHUB_WORKSPACE/product_files.txt" "$GITHUB_WORKSPACE/artifacts/" || true
          cp -v "$PRODUCT/vendor_boot_unpack/mkbootimg_args.txt" "$GITHUB_WORKSPACE/artifacts/" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangefox-rodin
          path: artifacts
          if-no-files-found: warn
