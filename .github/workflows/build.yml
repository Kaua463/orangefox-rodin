name: OrangeFox Recovery

on:
  workflow_dispatch:
    inputs:
      branch:
        description: OrangeFox sync branch
        required: true
        default: "14.1"
      lunch:
        description: Lunch target
        required: true
        default: "twrp_rodin-ap2a-eng"
      build_target:
        description: Build target
        required: true
        default: "recoveryimage"
      runner:
        description: Runner label
        required: true
        default: "ubuntu-latest"
      build_jobs:
        description: Parallel build jobs
        required: true
        default: "1"

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 720

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device-tree

      - name: Free disk space (remove unused preinstalled toolchains)
        shell: bash
        run: |
          set -euo pipefail
          # The 25209-action build ate through the runner's disk in ~5min
          # during peak compile (63G free -> 15G free) and died with ENOSPC
          # at 51% done. GH-hosted runners ship ~30-40GB of toolchains we
          # never use for an AOSP-style source build (repo/git bring our own
          # toolchain) — reclaim it before we need it.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost /opt/az 2>/dev/null || true
          df -h

      - name: Install host packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lz4 zstd pngcrush rsync schedtool \
            squashfs-tools unzip xsltproc zip zlib1g-dev mkbootimg

      - name: Install repo tool
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Show runner resources
        shell: bash
        run: |
          df -h
          free -h

      - name: Sync OrangeFox
        shell: bash
        run: |
          set -euo pipefail
          (
            while sleep 60; do
              echo "Heartbeat..."
              df -h
              free -h
            done
          ) &
          HEARTBEAT_PID=$!
          trap 'kill "$HEARTBEAT_PID" 2>/dev/null || true' EXIT

          git clone https://gitlab.com/OrangeFox/sync.git "$GITHUB_WORKSPACE/ofox-sync"
          cd "$GITHUB_WORKSPACE/ofox-sync"

          ./orangefox_sync.sh \
            --branch "${{ inputs.branch }}" \
            --path "$GITHUB_WORKSPACE/OrangeFox"

          kill "$HEARTBEAT_PID" 2>/dev/null || true
          trap - EXIT

      - name: Copy rodin device tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi"

          rsync -a --delete \
            --exclude ".git" \
            --exclude "images" \
            "$GITHUB_WORKSPACE/device-tree/" \
            "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/"

      - name: Verify prebuilts
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/prebuilt/vendor_boot_stock.img"
          ls -lh "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/prebuilt/vendor_ramdisk00" || true

      - name: Free space
        shell: bash
        run: |
          rm -rf "$GITHUB_WORKSPACE/OrangeFox/.repo"
          rm -rf "$GITHUB_WORKSPACE/ofox-sync"
          df -h
          free -h

      - name: Add build swap
        shell: bash
        run: |
          set -euo pipefail
          # Two prior runs (author's -j1 attempts and our -j3 attempt) both
          # died with "runner has received a shutdown signal" at the exact
          # same point: right after soong_build finishes compiling itself,
          # entering the Android.bp module-graph analysis phase. That phase
          # is memory-hungry and this runner only has 15GB RAM + 3GB swap.
          # README recommends exactly this for 16GB machines.
          sudo fallocate -l 16G /swap-build.img
          sudo chmod 600 /swap-build.img
          sudo mkswap /swap-build.img
          sudo swapon /swap-build.img
          free -h

      - name: Build OrangeFox
        shell: bash
        working-directory: ${{ github.workspace }}/OrangeFox
        env:
          ALLOW_MISSING_DEPENDENCIES: "true"
          FOX_BUILD_DEVICE: rodin
          FOX_AB_DEVICE: "1"
          FOX_VIRTUAL_AB_DEVICE: "1"
          OF_FORCE_PREBUILT_KERNEL: "1"
          OF_LOW_MEMORY_BUILD: "1"
          OF_BUILD_JOBS: "${{ inputs.build_jobs }}"
          NINJA_ARGS: "-j${{ inputs.build_jobs }}"
          SOONG_UI_NINJA_ARGS: "-j${{ inputs.build_jobs }}"
          USE_CCACHE: "0"
          GOMAXPROCS: "${{ inputs.build_jobs }}"
          GOGC: "20"
          GOMEMLIMIT: "3GiB"
          _JAVA_OPTIONS: "-Xmx3g"
        run: |
          set -eo pipefail
          source build/envsetup.sh
          lunch "${{ inputs.lunch }}"
          mka -j"${{ inputs.build_jobs }}" adbd "${{ inputs.build_target }}" 2>&1 | tee "$GITHUB_WORKSPACE/orangefox-build.log"

      - name: Locate recovery ramdisk
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT="$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin"

          find "$PRODUCT" -maxdepth 4 -type f | sort | tee "$GITHUB_WORKSPACE/product_files.txt" || true

          if [ ! -f "$PRODUCT/vendor_boot.img" ]; then
            echo "::error::No vendor_boot.img found (native vendorbootimage build did not produce one)"
            exit 1
          fi
          ls -lh "$PRODUCT/vendor_boot.img"

      # The recovery binary crash-loops on-device with "CANNOT LINK
      # EXECUTABLE ... cannot locate symbol
      # _ZNSt3__122__libcpp_verbose_abortEPKcz referenced by
      # libsysutils.so" -- confirmed (diagnostic CI run) that EVERY
      # libc++.so anywhere in this build's output is missing that symbol;
      # a genuine version-skew bug between this branch's pinned clang
      # prebuilt and its pinned external/libcxx source, not something
      # fixable by picking a different variant. Build a tiny standalone
      # shim providing the missing symbol (plain abort(), see
      # verbose_abort_shim.cpp), using a fresh NDK independent of the
      # broken in-tree toolchain/libcxx pairing -- and independent of the
      # main `mka` build entirely, so a mistake here can't break it.
      - name: Build verbose_abort compat shim (NDK, standalone)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          NDK_VER="r27c"
          curl -L "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip" -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /tmp/ndk
          NDK_CLANGXX="/tmp/ndk/android-ndk-${NDK_VER}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++"

          "$NDK_CLANGXX" -shared -fPIC -fno-exceptions -fno-rtti -nostdlib++ \
            -o "$GITHUB_WORKSPACE/libverbose_abort_shim.so" \
            "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/verbose_abort_shim.cpp"

          echo "=== confirming the shim exports the exact target symbol ==="
          SYM="_ZNSt3__122__libcpp_verbose_abortEPKcz"
          "/tmp/ndk/android-ndk-${NDK_VER}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm" -D \
            "$GITHUB_WORKSPACE/libverbose_abort_shim.so" | grep "$SYM"
          ls -lh "$GITHUB_WORKSPACE/libverbose_abort_shim.so"

      # The native `mka vendorbootimage` build (AOSP core Makefile's own
      # BOARD_VENDOR_RAMDISK_FRAGMENTS assembly) compiles the recovery
      # ramdisk correctly, but its OWN vendor_boot.img output has proven
      # unreliable in three separate, independent ways across three real
      # bootloop failures on the physical device:
      #   1. Size: 79380480 vs the real 67108864-byte partition (lz4 only
      #      gets ~36% ratio on this content).
      #   2. Compression format: first fix used xz (~17.5% ratio) and
      #      bootlooped -- the device kernel's actual config (verified via
      #      `adb shell su 0 -c "zcat /proc/config.gz"`) has CONFIG_RD_XZ
      #      NOT SET, only CONFIG_RD_GZIP/CONFIG_RD_LZ4/CONFIG_RD_ZSTD.
      #   3. Structure: switched to zstd (kernel-supported, verified) and
      #      bootlooped AGAIN. Diffing the full vendor_ramdisk_table
      #      against a live backup of the device's actual vendor_boot_a
      #      (`adb shell su 0 -c "cat /dev/block/by-name/vendor_boot_a"`)
      #      found the native build tags an essentially-empty 4-byte
      #      fragment as type=PLATFORM while the real 29MB platform
      #      ramdisk content ends up tagged type=NONE -- the boot process
      #      looks for platform content in the PLATFORM slot and finds
      #      nothing. Also found this device tree's prebuilt/vendor_ramdisk00
      #      and prebuilt/dtb were BOTH byte-different from what's actually
      #      flashed (the device received an OTA after those prebuilts were
      #      extracted).
      #
      # Given the native build's own field-by-field output failed three
      # independent verifications, recompress_recovery.py now treats
      # prebuilt/vendor_boot_stock.img (kept up to date -- see README) as
      # the complete source of truth for everything (platform ramdisk, dtb,
      # load addresses, cmdline, vendor_ramdisk_table structure) and pulls
      # ONLY the compiled recovery ramdisk content from the native build,
      # recompressing it with zstd (-19, --zstd=wlog=23 / 8MiB window,
      # pinned to stay under lib/decompress_unzstd.c's window-size check).
      - name: Rebuild vendor_boot from stock + recompressed recovery ramdisk
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          PRODUCT="$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin"
          STOCK="$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/prebuilt/vendor_boot_stock.img"
          OUT="$PRODUCT/vendor_boot_patched.img"

          # The apt-packaged /usr/bin/mkbootimg is broken (ModuleNotFoundError:
          # No module named 'gki' -- its generate_gki_certificate import isn't
          # satisfied by the Debian package layout). Use the ones OrangeFox's
          # own build already compiled as self-contained "embedded python
          # archives" instead (confirmed working). unpack_bootimg from apt is
          # fine (never hit that import).
          MKBOOTIMG_BIN="$GITHUB_WORKSPACE/OrangeFox/out/host/linux-x86/bin/mkbootimg"
          AVBTOOL_BIN="$GITHUB_WORKSPACE/OrangeFox/out/host/linux-x86/bin/avbtool"
          FINGERPRINT_FILE="$PRODUCT/build_fingerprint.txt"

          TOUCH_MODULES="$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/prebuilt/touch_modules"
          python3 "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/recompress_recovery.py" \
            "$PRODUCT/vendor_boot.img" "$STOCK" "$OUT" \
            unpack_bootimg "$MKBOOTIMG_BIN" "$AVBTOOL_BIN" "$FINGERPRINT_FILE" \
            "$GITHUB_WORKSPACE/libverbose_abort_shim.so" \
            "$GITHUB_WORKSPACE/OrangeFox/device/xiaomi/rodin/cpio_newc_patch.py" \
            "$TOUCH_MODULES/scp.ko" \
            "$TOUCH_MODULES/xiaomi_touch_rodin.ko" \
            "$TOUCH_MODULES/goodix_core_rodin.ko" \
            "$TOUCH_MODULES/focaltech_touch_rodin.ko"

          ls -lh "$OUT"
          SIZE=$(stat -c%s "$OUT")
          MAX=67108864
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::vendor_boot_patched.img still too large ($SIZE > $MAX)"
            exit 1
          fi
          echo "vendor_boot_patched.img fits: $SIZE <= $MAX"

          unpack_bootimg --boot_img "$OUT" | tee "$GITHUB_WORKSPACE/vendor_boot_patched_info.txt"

      - name: Collect artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          PRODUCT="$GITHUB_WORKSPACE/OrangeFox/out/target/product/rodin"

          if [ -d "$PRODUCT" ]; then
            find "$PRODUCT" \
              -maxdepth 1 \
              -type f \
              \( -name "*.img" -o -name "*.zip" -o -name "*.txt" \) \
              -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/" \;
          fi

          cp -v "$GITHUB_WORKSPACE/orangefox-build.log" "$GITHUB_WORKSPACE/artifacts/" || true
          cp -v "$GITHUB_WORKSPACE/vendor_boot_patched_info.txt" "$GITHUB_WORKSPACE/artifacts/" || true
          cp -v "$GITHUB_WORKSPACE/product_files.txt" "$GITHUB_WORKSPACE/artifacts/" || true
          cp -v "$PRODUCT/vendor_boot_unpack/mkbootimg_args.txt" "$GITHUB_WORKSPACE/artifacts/" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orangefox-rodin
          path: artifacts
          if-no-files-found: warn
